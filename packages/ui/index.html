<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lit UI — local dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500&family=Newsreader:ital,opsz,wght@0,6..72,500;0,6..72,600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        font-family: 'Newsreader', ui-serif, Georgia, serif;
        color: rgba(255, 250, 240, 0.9);
        background: #060504;
        background-image:
          radial-gradient(
            circle at 20% 20%,
            rgba(212, 165, 116, 0.14),
            transparent 42%
          ),
          linear-gradient(165deg, #0a0907, #030201);
        display: grid;
        place-items: center;
        padding: 2rem 1.25rem;
      }

      .grain {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.045;
        mix-blend-mode: overlay;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        z-index: 0;
      }

      .card {
        position: relative;
        z-index: 1;
        width: min(100%, 440px);
        padding: clamp(1.5rem, 4vw, 2rem);
        border-radius: 20px;
        border: 1px solid rgba(255, 248, 220, 0.1);
        background: rgba(18, 16, 14, 0.55);
        box-shadow:
          0 32px 64px rgba(0, 0, 0, 0.55),
          inset 0 1px 0 rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(12px);
        animation: card-in 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .card header {
        margin-bottom: 1.35rem;
      }

      .card .eyebrow {
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 0.65rem;
        font-weight: 500;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(212, 165, 116, 0.65);
        margin: 0 0 0.5rem;
      }

      .card h1 {
        margin: 0;
        font-size: 1.65rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        line-height: 1.15;
      }

      .card p.lede {
        margin: 0.45rem 0 0;
        font-size: 0.95rem;
        line-height: 1.45;
        color: rgba(255, 248, 220, 0.52);
      }

      ai-login {
        --login-accent: #dcb080;
        --login-accent-dim: rgba(220, 176, 128, 0.2);
        --login-bg: #100e0c;
        --login-field: #080706;
        --login-edge: rgba(255, 248, 220, 0.1);
        --login-fg: rgba(255, 252, 245, 0.93);
        --login-muted: rgba(255, 248, 220, 0.46);
      }

      @keyframes card-in {
        from {
          opacity: 0;
          transform: translateY(14px) scale(0.99);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .card {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>
    <div class="card">
      <header>
        <p class="eyebrow">Package dev shell</p>
        <h1>Local preview</h1>
        <p class="lede">
          Vite serves the library entry; edit components and reload.
        </p>
      </header>
      <ai-login
        heading="Sign in"
        tagline="Smoke-test the login surface."
        submit-label="Continue"
      ></ai-login>
    </div>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
